---
- name: "Require Correct Linux Distribution"
  assert:
    that: ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('22.0.0', '>=')
    msg: "This Linux distribution '{{ ansible_distribution }} {{ ansible_distribution_version }}' is not supported by the role."
    quiet: true
  tags: sbt

- name: "Load Variables"
  ansible.builtin.include_vars: "{{ lookup('first_found', files) }}"
  vars:
    files:
      - "vars/vars-{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}.yml"
      - "vars/vars-{{ ansible_distribution | lower }}.yml"
      - "vars/vars-{{ ansible_os_family | lower }}.yml"
  tags: sbt

- name: "Run Environment Tasks"
  ansible.builtin.include_tasks: "{{ lookup('first_found', files) }}"
  vars:
    files:
      - "tasks/tasks-{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
      - "tasks/tasks-{{ ansible_distribution | lower }}.yml"
      - "tasks/tasks-{{ ansible_os_family | lower }}.yml"
  tags: sbt

- name: "Global SBT Options"
  template:
    src: etc/sbt/sbtopts.j2
    dest: /etc/sbt/sbtopts
    owner: root
    group: root
    mode: "0644"
  tags: sbt

- name: Configure users
  ansible.builtin.include_tasks: configure_user.yml
  loop: "{{ sbt_users }}"
  loop_control:
    loop_var: sbt_user
  tags: sbt
